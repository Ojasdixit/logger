[build]
  command = "npm run build"
  functions = "netlify/functions"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# Environment variables for production
[context.production.environment]
  VITE_API_URL = "https://logger-lhu8.onrender.com"
  VITE_INSTALLER_URL = "https://employee-monitor-installers.onrender.com"

# Preview deployments (staging)
[context.deploy-preview.environment]
  VITE_API_URL = "https://your-backend-staging.onrender.com"
  VITE_INSTALLER_URL = "https://employee-monitor-installers.onrender.com"

# Development/branch deployments
[context.branch-deploy.environment]
  VITE_API_URL = "https://your-backend-staging.onrender.com"
  VITE_INSTALLER_URL = "https://employee-monitor-installers.onrender.com"

# Redirect API calls to the backend
[[redirects]]
  from = "/api/*"
  to = "https://logger-lhu8.onrender.com/api/:splat"
  status = 200
  force = false

# SPA fallback for client-side routing
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
