services:
  # Backend API
  - type: web
    name: employee-monitor-api
    root: backend
    buildCommand: npm install
    startCommand: node src/index.js
    envVars:
      - key: PORT
        value: 4000
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: ADMIN_USERNAME
        value: admin
      - key: ADMIN_PASSWORD
        sync: false
      - key: AGENT_API_KEY
        sync: false

  # Static Site for Installers
  - type: static_site
    name: employee-monitor-installers
    staticPublishPath: public
    buildCommand: echo "No build needed"
    envVars: []
